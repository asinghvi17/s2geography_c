name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout s2geography_c
        uses: actions/checkout@v4
        with:
          path: s2geography_c

      - name: Checkout s2geography
        uses: actions/checkout@v4
        with:
          repository: paleolimbot/s2geography
          ref: main
          path: s2geography

      - name: Setup conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          activate-environment: s2geography-dev
          use-mamba: true
          mamba-version: "*"

      - name: Install dependencies
        shell: bash -l {0}
        run: mamba install -y -n s2geography-dev cxx-compiler s2geometry libabseil cmake openssl

      - name: Configure
        shell: bash -l {0}
        run: |
          cmake -S s2geography -B build \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DS2GEOGRAPHY_BUILD_TESTS=ON \
            -DS2GEOGRAPHY_BUILD_C_API=ON \
            -DS2GEOGRAPHY_S2_SOURCE=CONDA

      - name: Build
        shell: bash -l {0}
        run: cmake --build build --config Release -j4

      - name: Run tests
        shell: bash -l {0}
        run: |
          cd build
          ctest -T test --output-on-failure .
